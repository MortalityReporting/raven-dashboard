<div class="summary-section-body">
  <div class="summary-section-grid">

    <div
      class="grid-row"
      role="group"
      [attr.aria-label]="'Death information'">
      <div class="grid-col-1">
        <record-viewer-mdi-to-edrs-viewer-content-field
          [label]="'Date/Time of Death'"
          [value]="deathInvestigation()?.dateTimeOfDeath?.toString() ?? ''"
          appSetFhirExplorer
          [resource]="$safeNavigationMigration(deathInvestigation()?.resource)"
        />
      </div>
      <div class="grid-col-1">
        <record-viewer-mdi-to-edrs-viewer-content-field
          [label]="'Place of Death'"
          [value]="$safeNavigationMigration(deathInvestigation()?.type)"
          appSetFhirExplorer
          [resource]="$safeNavigationMigration(deathInvestigation()?.resource)"
        />
      </div>
    </div>

    <div class="content-field-label margin-top-lg">
      <h3 id="death-location-heading" style="text-decoration: underline; margin: 0; font-size: inherit; font-weight: inherit;">
        Death Location
      </h3>
    </div>

    <div
      role="group"
      [attr.aria-labelledby]="'death-location-heading'">

      <div class="grid-row">
        <div class="grid-col-1">
          <record-viewer-mdi-to-edrs-viewer-content-field
            [label]="'Facility Name'"
            [value]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.facilityName)"
            appSetFhirExplorer
            [resource]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.resource)">
          </record-viewer-mdi-to-edrs-viewer-content-field>
        </div>
        <div class="grid-col-1" aria-hidden="true"></div>
      </div>

      @if (deathInvestigation()?.placeOfDeath?.addressText) {
        <div class="grid-row">
          <div class="grid-col-1">
            <record-viewer-mdi-to-edrs-viewer-content-field
              [label]="'Address Description'"
              [value]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.addressText)"
              appSetFhirExplorer
              [resource]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.resource)">
            </record-viewer-mdi-to-edrs-viewer-content-field>
          </div>
          <div class="grid-col-1" aria-hidden="true"></div>
        </div>
      } @else {
        <div class="grid-row">
          <div class="grid-col-1">
            <record-viewer-mdi-to-edrs-viewer-content-field
              [label]="'Address Line 1'"
              [value]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.address?.line1)"
              appSetFhirExplorer
              [resource]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.resource)">
            </record-viewer-mdi-to-edrs-viewer-content-field>
          </div>
          <div class="grid-col-1">
            <record-viewer-mdi-to-edrs-viewer-content-field
              [label]="'Address Line 2'"
              [value]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.address?.line2)"
              appSetFhirExplorer
              [resource]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.resource)">
            </record-viewer-mdi-to-edrs-viewer-content-field>
          </div>
        </div>

        <div class="grid-row">
          <div class="grid-col-1">
            <record-viewer-mdi-to-edrs-viewer-content-field
              [label]="'City'"
              [value]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.address?.city)"
              appSetFhirExplorer
              [resource]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.resource)">
            </record-viewer-mdi-to-edrs-viewer-content-field>
          </div>
          <div class="grid-col-1">
            <record-viewer-mdi-to-edrs-viewer-content-field
              [label]="'State'"
              [value]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.address?.state)"
              appSetFhirExplorer
              [resource]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.resource)">
            </record-viewer-mdi-to-edrs-viewer-content-field>
          </div>
          <div class="grid-col-1">
            <record-viewer-mdi-to-edrs-viewer-content-field
              [label]="'Zip Code'"
              [value]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.address?.zip)"
              appSetFhirExplorer
              [resource]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.resource)">
            </record-viewer-mdi-to-edrs-viewer-content-field>
          </div>
          <div class="grid-col-1">
            <record-viewer-mdi-to-edrs-viewer-content-field
              [label]="'Country'"
              [value]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.address?.country)"
              appSetFhirExplorer
              [resource]="$safeNavigationMigration(deathInvestigation()?.placeOfDeath?.resource)">
            </record-viewer-mdi-to-edrs-viewer-content-field>
          </div>
        </div>
      }
    </div>
  </div>
</div>
