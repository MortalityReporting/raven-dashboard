<div class="content-field">
  <div class="content-field-label">
    <label [attr.for]="elementId">{{label()}}:</label>
  </div>
  <div class="content-field-value">
    <input
      [attr.id]="elementId"
      type="text"
      [attr.value]="value() || ''"
      readonly
      [attr.aria-readonly]="'true'">
  </div>
</div>
