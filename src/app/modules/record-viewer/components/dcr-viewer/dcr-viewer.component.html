<main
  class="viewer-container-wrapper"
  role="main"
  [attr.aria-label]="'Death certificate record viewer'">

  <header class="viewer-container-header">
    <app-decedent-display
      appSetFhirExplorer
      [resource]="dcrRecord?.resource"
      [decedentInformation]="dcrRecord?.dcrSummary?.dcrHeader"
      [type]="'dcr'"
      role="banner"
      [attr.aria-label]="'Decedent information'">
    </app-decedent-display>
  </header>

  <div class="viewer-container-body">
    <nav
      [attr.aria-label]="'Death certificate record navigation menu'"
      role="navigation">
      <app-dcr-viewer-nav-menu
        (menuClickEvent)="onItemClick($event)">
      </app-dcr-viewer-nav-menu>
    </nav>

    <section
      class="viewer-container-body-content"
      role="region"
      [attr.aria-label]="'Death certificate record content'">
      <app-dcr-viewer-content [dcrRecord]="dcrRecord"></app-dcr-viewer-content>
    </section>

    <aside
      class="viewer-container-body-side-content viewer-container-body-side-fhir-explorer"
      [attr.hidden]="showDrawer[0] ? null : true"
      [attr.aria-hidden]="!showDrawer[0]"
      role="complementary"
      [attr.aria-label]="'FHIR Explorer panel'">
      <div class="fhir-explorer-header">
        <span class="explorer-header-title" id="fhir-explorer-title">
          FHIR Explorer (Click decedent header to show Bundle)
        </span>
        <span class="content-spacer" aria-hidden="true"></span>
        <mat-icon
          (click)="closeAllDrawers();"
          [attr.tabindex]="'0'"
          [attr.role]="'button'"
          [attr.aria-label]="'Close FHIR explorer panel'"
          [matTooltip]="'Close FHIR Explorer'"
          class="pointer">
          close
        </mat-icon>
      </div>
      <div
        class="fhir-explorer-body"
        [attr.aria-labelledby]="'fhir-explorer-title'">
        <app-fhir-explorer></app-fhir-explorer>
      </div>
    </aside>

    <div
      class="viewer-container-body-tabs"
      role="toolbar"
      [attr.aria-label]="'Viewer tools'">
      <div
        (click)="openDrawer(0);"
        [attr.tabindex]="'0'"
        [attr.role]="'button'"
        [attr.aria-expanded]="showDrawer[0]"
        [attr.aria-label]="'Open FHIR Explorer panel'"
        class="hl7-fhir-logo-tab">
        <img
          [attr.alt]="'FHIR logo'"
          src="assets/icon-fhir-32.png"
          class="fhir-explorer-icon"
          aria-hidden="true">
        <span class="fhir-explorer-label">FHIR Explorer</span>
      </div>
    </div>
  </div>
</main>
