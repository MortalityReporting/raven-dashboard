<div class="summary-section-grid">
  <div class="content-field-label">
    <h3 id="funeral-home-heading" style="text-decoration: underline; margin: 0; font-size: inherit; font-weight: inherit;">
      Funeral Home
    </h3>
  </div>

  <div
    role="group"
    [attr.aria-labelledby]="'funeral-home-heading'">

    <div class="grid-row">
      <div class="grid-col-1">
        <record-viewer-mdi-to-edrs-viewer-content-field
          [label]="'Name'"
          [value]="cremationClearanceInfo()?.funeralHome?.name"
          appSetFhirExplorer
          [resource]="cremationClearanceInfo()?.resource">
        </record-viewer-mdi-to-edrs-viewer-content-field>
      </div>
      <div class="grid-col-1" aria-hidden="true"></div>
    </div>

    @if (cremationClearanceInfo()?.funeralHome?.addressText) {
      <div class="grid-row">
        <div class="grid-col-1">
          <record-viewer-mdi-to-edrs-viewer-content-field
            [label]="'Address Description'"
            [value]="cremationClearanceInfo()?.funeralHome?.addressText"
            appSetFhirExplorer
            [resource]="cremationClearanceInfo()?.resource">
          </record-viewer-mdi-to-edrs-viewer-content-field>
        </div>
        <div class="grid-col-1" aria-hidden="true"></div>
      </div>
    } @else {
      <div class="grid-row">
        <div class="grid-col-1">
          <record-viewer-mdi-to-edrs-viewer-content-field
            [label]="'Address Line 1'"
            [value]="cremationClearanceInfo()?.funeralHome?.address?.line1"
            appSetFhirExplorer
            [resource]="cremationClearanceInfo()?.resource">
          </record-viewer-mdi-to-edrs-viewer-content-field>
        </div>
        <div class="grid-col-1">
          <record-viewer-mdi-to-edrs-viewer-content-field
            [label]="'Address Line 2'"
            [value]="cremationClearanceInfo()?.funeralHome?.address?.line2"
            appSetFhirExplorer
            [resource]="cremationClearanceInfo()?.resource">
          </record-viewer-mdi-to-edrs-viewer-content-field>
        </div>
      </div>

      <div class="grid-row">
        <div class="grid-col-1">
          <record-viewer-mdi-to-edrs-viewer-content-field
            [label]="'City'"
            [value]="cremationClearanceInfo()?.funeralHome?.address?.city"
            appSetFhirExplorer
            [resource]="cremationClearanceInfo()?.resource">
          </record-viewer-mdi-to-edrs-viewer-content-field>
        </div>
        <div class="grid-col-1">
          <record-viewer-mdi-to-edrs-viewer-content-field
            [label]="'State'"
            [value]="cremationClearanceInfo()?.funeralHome?.address?.state"
            appSetFhirExplorer
            [resource]="cremationClearanceInfo()?.resource">
          </record-viewer-mdi-to-edrs-viewer-content-field>
        </div>
        <div class="grid-col-1">
          <record-viewer-mdi-to-edrs-viewer-content-field
            [label]="'Zip Code'"
            [value]="cremationClearanceInfo()?.funeralHome?.address?.zip"
            appSetFhirExplorer
            [resource]="cremationClearanceInfo()?.resource">
          </record-viewer-mdi-to-edrs-viewer-content-field>
        </div>
        <div class="grid-col-1">
          <record-viewer-mdi-to-edrs-viewer-content-field
            [label]="'Country'"
            [value]="cremationClearanceInfo()?.funeralHome?.address?.country"
            appSetFhirExplorer
            [resource]="cremationClearanceInfo()?.resource">
          </record-viewer-mdi-to-edrs-viewer-content-field>
        </div>
      </div>
    }
  </div>
</div>
