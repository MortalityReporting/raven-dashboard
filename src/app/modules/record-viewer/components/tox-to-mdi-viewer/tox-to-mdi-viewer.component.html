@if (isLoading()) {
  <div
    class="margin-md center-contents"
    role="status"
    aria-live="polite"
    [attr.aria-busy]="'true'">
    <mat-spinner [attr.aria-label]="'Loading toxicology record'"></mat-spinner>
    <span class="visually-hidden">Loading toxicology record, please wait...</span>
  </div>
} @else if (toxToMdiRecord) {
  <div
    class="viewer-container-wrapper"
    role="main"
    [attr.aria-label]="'Toxicology to MDI record viewer'">

    <div class="viewer-container-header" role="banner">
      <app-decedent-display
        appSetFhirExplorer
        [resource]="toxToMdiRecord?.messageBundle"
        [decedentInformation]="toxToMdiRecord?.toxHeader"
        [type]="'tox'"
        [attr.aria-label]="'Decedent information'">
      </app-decedent-display>
    </div>

    <div class="viewer-container-body">
      <div [attr.aria-label]="'Toxicology record navigation menu'" role="navigation">
        <record-viewer-tox-to-mdi-viewer-nav-menu
          (menuClickEvent)="onItemClick($event)">
        </record-viewer-tox-to-mdi-viewer-nav-menu>
      </div>

      <record-viewer-tox-to-mdi-viewer-content
        class="viewer-container-body-content"
        [toxToMdiRecord]="toxToMdiRecord"
        role="region"
        [attr.aria-label]="'Toxicology record content'">
      </record-viewer-tox-to-mdi-viewer-content>

      <div
        class="viewer-container-body-side-content viewer-container-body-side-fhir-explorer"
        [hidden]="!showDrawer[0]"
        [attr.aria-hidden]="!showDrawer[0]"
        role="complementary"
        [attr.aria-label]="'FHIR Explorer panel'">
        <div class="fhir-explorer-header">
          <span class="explorer-header-title" role="heading" [attr.aria-level]="'2'">
            FHIR Explorer
          </span>
          <span class="visually-hidden">Click decedent header to show Bundle</span>
          <span class="content-spacer" aria-hidden="true"></span>
          <button
            type="button"
            (click)="closeAllDrawers();"
            [attr.aria-label]="'Close FHIR explorer panel'"
            [matTooltip]="'Close FHIR Explorer'"
            style="background: none; border: none; padding: 0; cursor: pointer; display: inline-flex; align-items: center;">
            <mat-icon aria-hidden="true">close</mat-icon>
          </button>
        </div>
        <div
          class="fhir-explorer-body"
          [attr.aria-label]="'FHIR Explorer content'">
          <app-fhir-explorer></app-fhir-explorer>
        </div>
      </div>

      <div
        class="viewer-container-body-tabs"
        role="toolbar"
        [attr.aria-label]="'Viewer tools'">
        <button
          type="button"
          (click)="openDrawer(0);"
          [attr.aria-expanded]="showDrawer[0]"
          [attr.aria-label]="'Open FHIR Explorer panel'"
          style="background: none; border: none; padding: 0; cursor: pointer; display: inline-flex; align-items: center; flex-direction: column;"
          class="hl7-fhir-logo-tab">
          <img
            src="assets/icon-fhir-32.png"
            [attr.alt]="'FHIR logo'"
            class="fhir-explorer-icon"
            aria-hidden="true">
          <span class="fhir-explorer-label">FHIR Explorer</span>
        </button>
      </div>
    </div>
  </div>
} @else {
  <div
    class="margin-left-lg"
    role="status"
    aria-live="polite">
    No message bundle found.
  </div>
}
