<section aria-labelledby="case-selection-heading">
  <h2 id="case-selection-heading" class="visually-hidden">MDI to EDRS Case Selection</h2>

  <mat-card class="margin-top-md">
    <mat-card-content>
      <mat-tab-group
        #mdiToEdrsTabGroup
        (selectedTabChange)="tabSelectionChange()"
        mat-stretch-tabs="false"
        [attr.aria-label]="'Select method to choose MDI case'">

      <mat-tab label="{{ uiConstants.step1.TAB_LABEL_1 }}">
        <app-mdi-to-edrs-grid></app-mdi-to-edrs-grid>
      </mat-tab>

      <mat-tab label="{{ uiConstants.step1.TAB_LABEL_2 }}">
        <app-import-mdi-to-edrs-document></app-import-mdi-to-edrs-document>
      </mat-tab>

      </mat-tab-group>
    </mat-card-content>
  </mat-card>

  <nav class="margin-top-md right-aligned" aria-label="Wizard step navigation">
    <button
      mat-raised-button
      type="button"
      [style.background-color]="config.backgroundColor"
      [style.color]="'white'"
      (click)="onAdvanceStepper()"
      class="action-button"
      [attr.aria-label]="uiConstants.step1.PROCEED_TO_NEXT_STEP_BTN">
      {{ uiConstants.step1.PROCEED_TO_NEXT_STEP_BTN }}
    </button>
  </nav>
</section>
