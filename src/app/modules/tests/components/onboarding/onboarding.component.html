<div class="generic-component-wrapper">
  <div class="generic-component-content">
    <div
      class="margin-bottom-md"
      role="toolbar"
      [attr.aria-label]="'Network connection configuration actions'">
      <input
        type="file"
        class="file-input"
        (click)="fileUpload.value=null"
        accept="application/json"
        (change)="onFileSelected($event)"
        #fileUpload
        title="Import network connection configuration file"
        [attr.aria-label]="'Select JSON file to import'">
      <button
        mat-stroked-button
        type="button"
        (click)="fileUpload.click();"
        [attr.aria-label]="'Import network connection configuration from file'">
        <mat-icon aria-hidden="true">download</mat-icon>
        <span>Import Network Connection Config</span>
      </button>
      <button
        mat-stroked-button
        type="button"
        class="margin-left-md"
        (click)="onExportStage(formValueAcc)"
        [attr.aria-label]="'Export network connection configuration to file'">
        <mat-icon aria-hidden="true">publish</mat-icon>
        <span>Export Network Connection Config</span>
      </button>
    </div>

    <mat-accordion
      multi
      role="region"
      [attr.aria-label]="'Network connection stages'">
      @for (stage of stageList; track stage; let i = $index) {
        <mat-expansion-panel
          [expanded]="stage.expanded"
          [attr.aria-label]="'Stage ' + getStageIndex(i)">
          <mat-expansion-panel-header
            [attr.aria-controls]="'stage-' + i + '-content'"
            [attr.aria-expanded]="stage.expanded">
            <mat-panel-title class="margin-top-md margin-bottom-md">
              <button
                mat-mini-fab
                type="button"
                color="warn"
                [attr.aria-label]="'Remove stage ' + getStageIndex(i)"
                [matTooltip]="'Remove stage'"
                (click)="removeComponent(i); $event.stopPropagation()"
                [disabled]="stageList?.length == 1"
                [attr.aria-disabled]="stageList?.length == 1">
                <mat-icon aria-hidden="true">remove</mat-icon>
              </button>
              <span class="margin-left-md" [attr.id]="'stage-' + i + '-title'">Stage {{ getStageIndex(i) }}</span>
            </mat-panel-title>
          </mat-expansion-panel-header>
          <div
            [attr.id]="'stage-' + i + '-content'"
            role="region"
            [attr.aria-labelledby]="'stage-' + i + '-title'">
            <app-http-connection
              [stage]="stage"
              (formValueChangeEvent)="onFormValueChange($event, i)">
            </app-http-connection>
          </div>
        </mat-expansion-panel>
      }
    </mat-accordion>

    <div
      class="flex margin-bottom-md margin-top-md"
      role="toolbar"
      [attr.aria-label]="'Stage management'">
      <button
        class="push-right"
        type="button"
        mat-raised-button
        [style.background-color]="config.backgroundColor"
        [style.color]="'white'"
        (click)="addStage()"
        [attr.aria-label]="'Add new stage'">
        <mat-icon aria-hidden="true">add</mat-icon>
        <span>Add Stage</span>
      </button>
    </div>

    <mat-card
      class="top-margin"
      role="region"
      [attr.aria-label]="'Console output'">
      <mat-card-content>
        <mat-card-title>
          <h2 style="margin: 0; font-size: inherit; font-weight: inherit;">Console Output</h2>
        </mat-card-title>
        <div
          role="log"
          [attr.aria-label]="'Console log messages'"
          [attr.aria-live]="'polite'">
          <ngx-console [logs]="loggerData"></ngx-console>
        </div>
        <button
          mat-raised-button
          type="button"
          (click)="clearLog()"
          class="margin-top-md"
          [attr.aria-label]="'Clear console log'">
          Clear Log
        </button>
      </mat-card-content>
    </mat-card>

  </div>
</div>
